# --- MySQL Connection ---
# Example using environment variables for your MySQL connection

spring.datasource.url=jdbc:mysql://${DATABASE_HOST:${HOST_OVERRIDE}}:${DATABASE_PORT:3306}/${DATABASE_NAME:demo_spring}?sslMode=REQUIRED
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:admin123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# JWT or other app properties
bezkoder.app.jwtSecret=====================BezKoder=Spring===========================
bezkoder.app.jwtExpirationMs=86400000

# File upload limit
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB