# .github/workflows/keep-awake.yml
name: Keep Render Awake
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping root endpoint
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" https://your-app-name.onrender.com/)
          echo "Render responded with HTTP $status"
